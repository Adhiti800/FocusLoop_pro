{% extends "base.html" %}
{% block content %}
{% load static %}
<script src="{% static 'dashboard/js/b_script.js' %}"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
<html>
    <title>FocusLoop - Information</title>

    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
            background: linear-gradient(270deg, #FFD6E0, #FFE4E9, #E0F7FA, #FFF3E0);
            background-size: 800% 800%;
            animation: gradientShift 20s ease infinite;
            transition: opacity 0.5s ease;
        }

        @keyframes gradientShift {
            0% {
            background-position: 0% 50%;
            }

            50% {
            background-position: 100% 50%;
            }

            100% {
            background-position: 0% 50%;
            }
        }

        .floating-icon {
            position: absolute;
            opacity: 0.65;
            animation: float 6s ease-in-out infinite, rotate 12s linear infinite;
        }

        @keyframes float {
            0% {
            transform: translateY(0) scale(1);
            }

            50% {
            transform: translateY(-20px) scale(1.05);
            }

            100% {
            transform: translateY(0) scale(1);
            }
        }

        @keyframes rotate {
            0% {
            transform: rotate(0deg);
            }

            100% {
            transform: rotate(360deg);
            }
        }
        .info-card {
            background-color: #FFFFFF;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            max-width: 500px;
            width: 90%;
            z-index: 10;
            animation: fadeIn 1.5s ease forwards;
        }

        @keyframes fadeIn {
            0% {
            opacity: 0;
            transform: translateY(-20px);
            }

            100% {
            opacity: 1;
            transform: translateY(0);
            }
        }

        .info-card h1 {
            /*font-size: 2.2rem;*/
            color: #FF4C82;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .info-card p {
            font-size: 1rem;
            color: #444;
            margin-bottom: 25px;
        }

        .icon2 {
            top: 70%;
            left: 8%;
            width: 50px;
            animation-delay: 2s;
        }

        .icon3 {
            top: 18%;
            right: 10%;
            width: 50px;
            animation-delay: 1s;
        }

        .icon6 {
            bottom: 20%;
            left: 25%;
            width: 60px;
            animation-delay: 2.5s;
        }

        .icon7 {
            top: 30%;
            right: 25%;
            width: 50px;
            animation-delay: 0.8s;
        }

        .icon8 {
            bottom: 5%;
            right: 10%;
            width: 40px;
            animation-delay: 1.2s;
        }

        .icon9 {
            top: 5%;
            right: 40%;
            width: 55px;
            animation-delay: 2.8s;
        }
        
    </style>

        <!-- Floating icons-->
        <img src="https://img.icons8.com/emoji/48/scroll-emoji.png" class="floating-icon icon2" alt="Scroll icon" />
        <img src="https://img.icons8.com/emoji/48/books-emoji.png" class="floating-icon icon3" alt="Books icon" />
        <img src="https://img.icons8.com/color/48/laptop--v1.png" class="floating-icon icon6" alt="Laptop icon" />
         
        <img src="https://img.icons8.com/color/48/pencil--v1.png" class="floating-icon icon8" alt="Pencil icon" />
        <img src="https://img.icons8.com/color/48/school-building.png" class="floating-icon icon9" alt="School icon" />
        <img src="https://img.icons8.com/color/48/open-book--v1.png" class="floating-icon icon7" alt="Open book icon" />
    

    <body>
        <div class="info-card">
            <h1>Information</h1>
            <form method="post">
                {% csrf_token %}
                <p>Name: {{ student.student_name }}</p>
                <p>Class: {{ student.student_class }}</p>
                <p>Section: {{ student.section }}</p>
                <p>Roll Number: {{ student.roll_number }}</p>
                <a href="{% url 'dashboard:student_home' %}">Go to Dashboard</a>
            </form>
        </div>
    </body>

</html>

{% endblock %}
